# Server-Konfiguration für den Betrieb als Website
# (gilt automatisch, wenn die App aus diesem Ordner gestartet wird)

[server]
# Auf allen Netzwerk-Interfaces lauschen -> App ist im Netzwerk erreichbar
address = "0.0.0.0"
port = 8501
headless = true

# Upload-Limit (MB), hier nicht kritisch, konservativ gesetzt
maxUploadSize = 10

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2563eb"
